# fly.toml app configuration file generated for rigor-api on 2026-04-26T23:43:49-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rigor-api'
primary_region = 'sjc'

[build]

[env]
  PORT = '8080'
  USE_HOSTED_MODELS = 'false'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/v1/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
